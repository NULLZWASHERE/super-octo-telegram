<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATOOL • Microsoft Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
    .terminal { font-family: 'Courier New', monospace; }
    .glow { text-shadow: 0 0 15px rgb(34 211 238); }
    .log-line { animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-4xl mx-auto p-6">
    <!-- Banner -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 bg-black border border-cyan-500 rounded-3xl px-10 py-5">
        <span class="text-5xl">🔥</span>
        <div>
          <h1 class="text-6xl font-bold tracking-tighter text-cyan-400 glow">ATOOL</h1>
          <p class="text-cyan-300 text-sm tracking-[6px] uppercase font-medium">Microsoft Checker</p>
        </div>
      </div>
    </div>

    <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-8 shadow-2xl">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-3xl font-semibold flex items-center gap-3">
          <i class="fas fa-bolt text-yellow-400"></i>
          Live Checker
        </h2>
        <div id="status" class="px-5 py-2 bg-zinc-800 rounded-2xl flex items-center gap-3 text-sm">
          <div class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></div>
          <span class="text-emerald-400">Ready</span>
        </div>
      </div>

      <textarea id="combos" rows="12"
        class="w-full bg-black border border-zinc-700 rounded-2xl p-6 text-sm font-mono resize-none focus:outline-none focus:border-cyan-500 transition-all"
        placeholder="email:password&#10;user@hotmail.com:pass123&#10;test@outlook.com:password456"></textarea>

      <div class="mt-5 flex gap-4">
        <input type="text" id="webhook" 
          class="flex-1 bg-zinc-900 border border-zinc-700 rounded-2xl px-6 py-4 text-sm focus:outline-none focus:border-cyan-500"
          placeholder="Discord Webhook URL (optional)">
        
        <button onclick="startCheck()" 
          id="startBtn"
          class="bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-400 hover:to-blue-500 transition-all text-black font-bold px-12 py-4 rounded-2xl flex items-center gap-3 text-lg">
          <i class="fas fa-play"></i>
          START CHECKING
        </button>
      </div>

      <!-- Live Stats -->
      <div class="mt-8 grid grid-cols-3 gap-4">
        <div class="bg-zinc-900 border border-emerald-500/40 rounded-2xl p-6 text-center">
          <div class="text-emerald-400 text-sm mb-1 font-medium">HITS</div>
          <div id="hits-count" class="text-6xl font-bold text-emerald-400">0</div>
        </div>
        <div class="bg-zinc-900 border border-yellow-500/40 rounded-2xl p-6 text-center">
          <div class="text-yellow-400 text-sm mb-1 font-medium">2FA</div>
          <div id="2fa-count" class="text-6xl font-bold text-yellow-400">0</div>
        </div>
        <div class="bg-zinc-900 border border-red-500/40 rounded-2xl p-6 text-center">
          <div class="text-red-400 text-sm mb-1 font-medium">BAD</div>
          <div id="bad-count" class="text-6xl font-bold text-red-400">0</div>
        </div>
      </div>

      <!-- Live Log -->
      <div class="mt-8">
        <div class="text-xs uppercase tracking-widest text-zinc-500 mb-3 flex items-center gap-2">
          <i class="fas fa-terminal"></i>
          LIVE LOG
        </div>
        <div id="log" class="terminal bg-black border border-zinc-800 rounded-3xl p-6 h-96 overflow-y-auto text-sm text-zinc-300 leading-relaxed"></div>
      </div>
    </div>

    <div class="text-center text-zinc-500 text-xs mt-10">
      ATOOL • Built for Speed • 2026
    </div>
  </div>

  <script>
    let eventSource = null;

    function log(message, color = "text-zinc-300") {
      const logDiv = document.getElementById("log");
      const time = new Date().toLocaleTimeString('en-US', { hour12: false });
      logDiv.innerHTML += `<span class="text-zinc-500">[${time}] </span><span class="${color}">${message}</span><br>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function connectSSE() {
      if (eventSource) eventSource.close();
      eventSource = new EventSource('/api/stream');
      eventSource.onmessage = (e) => {
        console.log("Live ping received");
      };
      eventSource.onerror = () => {
        console.log("SSE connection lost");
      };
    }

    async function startCheck() {
      const combosText = document.getElementById("combos").value.trim();
      const webhook = document.getElementById("webhook").value.trim();

      if (!combosText) {
        alert("Please enter some combos!");
        return;
      }

      const combos = combosText.split('\n').filter(line => line.trim());
      
      log("🚀 Starting Microsoft Checker...", "text-cyan-400");
      document.getElementById("status").innerHTML = `
        <div class="w-3 h-3 bg-orange-500 rounded-full animate-pulse"></div>
        <span class="text-orange-400">Running...</span>
      `;

      try {
        const res = await fetch("/api/check", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ combos, webhook })
        });

        const data = await res.json();

        document.getElementById("hits-count").textContent = data.hits.length;
        document.getElementById("2fa-count").textContent = data["2fa"].length || 0;
        document.getElementById("bad-count").textContent = data.bad.length;

        log(`✅ Finished! Hits: ${data.hits.length} | 2FA: ${data["2fa"].length || 0}`, "text-emerald-400");

      } catch (err) {
        log("❌ Error: " + err.message, "text-red-400");
      }

      document.getElementById("status").innerHTML = `
        <div class="w-3 h-3 bg-emerald-500 rounded-full"></div>
        <span class="text-emerald-400">Idle</span>
      `;
    }

    // Keyboard shortcut
    document.getElementById("combos").addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        startCheck();
      }
    });

    // Connect live updates
    connectSSE();
  </script>
</body>
</html>
